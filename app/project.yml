name: Nucleus
options:
  bundleIdPrefix: net.suherman
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"
  NucleusPackages:
    path: ..
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  Nucleus:
    type: application
    platform: macOS
    sources:
      - path: Nucleus
        excludes:
          - Assets/AppIcon.icns
          - Assets/AppIconSource.png
          - Assets/AppIconSource.raw.png
          - entitlements.mac.plist
          - entitlements.mac.icloud.plist
    resources:
      - path: Nucleus/Assets/AppIcon.icns
      - path: Nucleus/Assets/Sounds
      - path: Nucleus/Resources/ReleaseNotes.json
      - path: Nucleus/Resources/DashboardQuotes.json
      - path: Nucleus/Resources/nucleus-bills-import-demo.csv
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.suherman.nucleus
        INFOPLIST_FILE: Nucleus/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Nucleus/entitlements.mac.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Q3TXW887NM
        CURRENT_PROJECT_VERSION: 8005
        MARKETING_VERSION: 0.8.5
        ENABLE_HARDENED_RUNTIME: YES
        SPARKLE_PUBLIC_ED_KEY: B6P7+AkeawAfMFk4f5j3+0diuQWorDuCYNrVX0vJeV0=
        OTHER_LDFLAGS: $(inherited) -weak_framework FoundationModels
      configs:
        Debug:
          SPARKLE_FEED_URL: http://127.0.0.1:3000/appcast.xml
        Release:
          SPARKLE_FEED_URL: https://nucleus-registry.suherman.net/appcast.xml
    dependencies:
      - package: Sparkle
        product: Sparkle
      - package: NucleusPackages
        product: NucleusKit
      - package: NucleusPackages
        product: DatabaseKit
      - package: NucleusPackages
        product: AccountKit
      - package: NucleusPackages
        product: MailKit
      - package: NucleusPackages
        product: CalendarKit
      - package: NucleusPackages
        product: ClipboardKit
      - package: NucleusPackages
        product: NotesKit
      - package: NucleusPackages
        product: SyncKit
      - sdk: WeatherKit.framework
      - sdk: CoreLocation.framework
      - sdk: FoundationModels.framework
      - sdk: MusicKit.framework
      - sdk: AVKit.framework
    scheme:
      testTargets: []

schemes:
  Nucleus:
    build:
      targets:
        Nucleus: all
    run:
      config: Debug
